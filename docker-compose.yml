services:
  # Development: hot-reloading Vite server on host :8000 (same as install).
  # The collector API is internal-only on the compose network; Vite proxies /v1.
  dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4000"
    ports:
      - "8000:4000"
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api

  # Python collector. Receives Claude/Cursor hook events and stores them in a
  # single SQLite DB in the user's home (~/.cot/cot.db on the host).
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    expose:
      - "8000"
    volumes:
      - ./backend/app:/app/app
      - ./bridge:/app/bridge
      - ${HOME}/.cot:/root/.cot
    environment:
      - COT_DB_PATH=/root/.cot/cot.db

  # Production: static dashboard served by nginx.
  web:
    profiles: ["prod"]
    build: .
    ports:
      - "8000:80"

volumes:
  node_modules_cache:
